[package]
name = "hypercurve"
version = "0.1.0"
edition = "2024"
readme = "README.md"

[package.metadata.docs.rs]
all-features = true

[dependencies]
hyperreal = { path = "../hyperreal", version = "0.11.1", default-features = false }
hyperlimit = { path = "../hyperlimit", version = "0.2.0", default-features = false, features = ["std"], optional = true }

[dev-dependencies]
cavalier_contours = { git = "https://github.com/timschmidt/cavalier_contours", branch = "shape-boolean-transformation" }
geo = "0.32"
proptest = "1"
static_aabb2d_index = "2.0"

[features]
default = ["predicates"]
predicates = ["dep:hyperlimit"]
serde = []

[[bench]]
name = "boolean_pipeline"
harness = false

[[bench]]
name = "containment"
harness = false

[[bench]]
name = "intersection"
harness = false

[[bench]]
name = "offset"
harness = false

[[bench]]
name = "reconstruction"
harness = false

[[bench]]
name = "bezier_facts"
harness = false
