[package]
name = "hypercurve"
version = "0.1.0"
edition = "2024"
readme = "README.md"

[package.metadata.docs.rs]
all-features = true

[dependencies]
hyperlattice = { path = "../hyperlattice", version = "0.4.0", default-features = false, features = ["hyperreal-backend"] }
hyperlimit = { path = "../hyperlimit", version = "0.2.0", default-features = false, features = ["std", "hyperlattice", "hyperreal"], optional = true }

[dev-dependencies]
cavalier_contours = { path = "../cavalier_contours/cavalier_contours" }
geo = "0.32"
proptest = "1"
static_aabb2d_index = "2.0"

[features]
default = ["predicates"]
predicates = ["dep:hyperlimit"]
serde = []

[[bench]]
name = "boolean_pipeline"
harness = false

[[bench]]
name = "containment"
harness = false

[[bench]]
name = "intersection"
harness = false

[[bench]]
name = "offset"
harness = false
