<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>hypercurve UI</title>
    <link data-trunk rel="rust" data-wasm-opt="2">
    <base data-trunk-public-url>
    <style>
        html {
            touch-action: manipulation;
        }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #24272d;
        }
        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #loading_text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #d8dee9;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <div id="loading_text">Loading hypercurve UI...</div>
</body>
</html>
